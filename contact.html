<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - YouTube Thumbnail Downloader</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0000;
            --text-color: #f1f1f1;
            --text-muted: #aaaaaa;
            --border-color: #383838;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        h1 { font-size: 2rem; margin-bottom: 20px; text-align: center; }
        h1 span { color: var(--accent-color); }
        p { color: var(--text-muted); line-height: 1.8; margin-bottom: 15px; text-align: center; }
        a { color: #3ea6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:hover { background: var(--accent-hover); text-decoration: none; }
        .contact-info {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            margin-top: 20px;
        }
        .contact-info p { margin-bottom: 10px; }
        .email-link {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Tool</a>
        <h1>Contact <span>Us</span></h1>
        
        <p>Have a question, suggestion, or feedback? We'd love to hear from you!</p>

        <div class="contact-info">
            <p style="color: var(--text-color); font-weight: 600;">📧 Email Us:</p>
            <p><a href="mailto:your-email@example.com" class="email-link">androgamer5323@gmail.com</a></p>
            <p style="font-size: 0.9rem; margin-top: 15px;">We typically respond within 24-48 hours.</p>
        </div>

        <p style="margin-top: 25px; font-size: 0.9rem;">
            For advertising inquiries, please mention "Ad Collaboration" in your subject line.
        </p>
    </div>
</body>
</html>
